<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - AWS 雲端內部案件管理系統</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
            background: linear-gradient(135deg, #eef4ff 0%, #f5f7fb 45%, #f0f4ff 100%);
            min-height: 100vh;
            color: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-card {
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid #dbeafe;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 24px 50px rgba(15, 23, 42, 0.08);
        }

        .title {
            font-size: 30px;
            font-weight: 900;
            color: #1e3a8a;
            margin-bottom: 10px;
            text-align: center;
        }

        .desc {
            text-align: center;
            color: #64748b;
            margin-bottom: 24px;
            line-height: 1.7;
        }

        .flash-wrap {
            margin-bottom: 16px;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .alert-success {
            background: #ecfdf5;
            color: #047857;
            border: 1px solid #a7f3d0;
        }

        .alert-danger {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .alert-warning {
            background: #fff7ed;
            color: #c2410c;
            border: 1px solid #fed7aa;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 700;
            color: #334155;
        }

        input {
            width: 100%;
            border: 1px solid #dbe2ea;
            border-radius: 14px;
            padding: 13px 14px;
            font-size: 15px;
            outline: none;
            transition: all 0.18s ease;
        }

        input:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.18);
        }

        .btn-login {
            width: 100%;
            border: none;
            border-radius: 16px;
            padding: 14px 18px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(135deg, #2563eb, #4338ca);
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.22);
            transition: all 0.2s ease;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(37, 99, 235, 0.28);
        }

        .demo-box {
            margin-top: 22px;
            background: #f8fbff;
            border: 1px solid #dbeafe;
            border-radius: 16px;
            padding: 16px;
            color: #475569;
            font-size: 13px;
            line-height: 1.8;
        }

        .demo-box strong {
            color: #1e3a8a;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="title">系統登入</div>
        <div class="desc">AWS 雲端內部案件管理系統</div>

        <div class="flash-wrap">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">帳號</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn-login">登入</button>
        </form>

        <div class="demo-box">
            <strong>測試帳號：</strong><br>
            submitter01 / submitter123<br>
            agent01 / agent123<br>
            admin01 / admin123
        </div>
    </div>
</body>
</html>
